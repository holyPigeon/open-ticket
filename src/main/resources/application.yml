spring:
  profiles:
    default: local

  threads:
    virtual:
      enabled: true

  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/open_ticket
    username: root
    password: '0000'
  jpa:
    hibernate:
      ddl-auto: none
---
spring:
  config:
    activate:
      on-profile: local

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

    defer-datasource-initialization: true

    properties:
      hibernate:
        format_sql: true

queue:
  type: redis
  max-active-per-event: 100
  active-window-seconds: 30    # 로컬 테스트: 30초 후 미응답 슬롯 자동 회수 (운영: 600)
